<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a1b2e"/>
      <stop offset="100%" stop-color="#0a0b14"/>
    </linearGradient>
    <linearGradient id="letter-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#e8c547"/>
      <stop offset="100%" stop-color="#00d4ff"/>
    </linearGradient>
    <linearGradient id="ring-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7c5cfc"/>
      <stop offset="50%" stop-color="#e8c547"/>
      <stop offset="100%" stop-color="#00d4ff"/>
    </linearGradient>
    <clipPath id="rounded">
      <rect width="512" height="512" rx="112" ry="112"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="112" ry="112" fill="url(#bg-grad)"/>

  <!-- Subtle radial glow -->
  <radialGradient id="glow" cx="50%" cy="40%" r="55%">
    <stop offset="0%" stop-color="#7c5cfc" stop-opacity="0.18"/>
    <stop offset="100%" stop-color="#7c5cfc" stop-opacity="0"/>
  </radialGradient>
  <rect width="512" height="512" rx="112" ry="112" fill="url(#glow)"/>

  <!-- Border ring -->
  <rect x="4" y="4" width="504" height="504" rx="110" ry="110"
    fill="none" stroke="url(#ring-grad)" stroke-width="2.5" opacity="0.5"/>

  <!-- Dumbbell icon - bar -->
  <rect x="176" y="244" width="160" height="24" rx="12" fill="url(#letter-grad)"/>

  <!-- Left weight plate outer -->
  <rect x="120" y="210" width="40" height="92" rx="10" fill="url(#letter-grad)"/>
  <!-- Left weight plate inner cutout -->
  <rect x="130" y="224" width="20" height="64" rx="6" fill="#0f1020" opacity="0.6"/>

  <!-- Right weight plate outer -->
  <rect x="352" y="210" width="40" height="92" rx="10" fill="url(#letter-grad)"/>
  <!-- Right weight plate inner cutout -->
  <rect x="362" y="224" width="20" height="64" rx="6" fill="#0f1020" opacity="0.6"/>

  <!-- Left collar -->
  <rect x="158" y="228" width="20" height="56" rx="6" fill="#a78bfa"/>
  <!-- Right collar -->
  <rect x="334" y="228" width="20" height="56" rx="6" fill="#a78bfa"/>

  <!-- App name below icon -->
  <text x="256" y="380"
    text-anchor="middle"
    font-family="Arial Black, 'Arial Bold', sans-serif"
    font-weight="900"
    font-size="72"
    letter-spacing="4"
    fill="url(#letter-grad)">FITTRACK</text>
</svg>
